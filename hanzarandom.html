<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Hanja 4-Character Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --theme-glow: rgba(255, 110, 0, 0.25);
            --theme-color: #ff6e00;
        }

        body {
            background: radial-gradient(circle, #0f0a0a 0%, #050303 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Noto Serif KR', 'Noto Serif JP', 'Georgia', serif;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--theme-glow);
            filter: blur(140px);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            transition: all 1.5s ease;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(18, 12, 12, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 60px 80px;
            border-radius: 4px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            text-align: center;
            min-width: 520px;
            border-left: 4px solid var(--theme-color);
            transition: border-color 1.5s ease;
        }

        #label-display {
            font-size: 0.8rem;
            color: var(--theme-color);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            opacity: 0.7;
            transition: color 1.5s ease;
        }

        #string-display {
            font-size: 5.5rem;
            font-weight: 500;
            color: #f5f5f7;
            letter-spacing: 12px;
            padding-left: 12px; 
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4),
                         0 0 40px var(--theme-glow);
            display: inline-block;
            white-space: nowrap;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        /* 3-Second Animation Cycle */
        @keyframes pulse-glow {
            0% {
                transform: scale(0.97);
                opacity: 0;
                filter: blur(10px);
            }
            12% {
                transform: scale(1.02);
                opacity: 1;
                filter: blur(0px);
            }
            88% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0px);
            }
            100% {
                transform: scale(0.98);
                opacity: 0;
                filter: blur(6px);
            }
        }
    </style>
</head>
<body>

    <div class="ambient-glow" id="ambient"></div>

    <div class="card">
        <div id="label-display">Hanja Phrase Oracle</div>
        <div id="string-display">四字成語</div>
    </div>

    <script>
        const stringEl = document.getElementById("string-display");
        
        // Verified 100% clean character pool array
        const hanjaPool = [
            "天", "地", "玄", "黃", "宇", "宙", "洪", "荒", "日", "月", "盈", "仄", "辰", "宿", "列", "張",
            "寒", "來", "暑", "往", "秋", "收", "冬", "藏", "閏", "餘", "成", "歲", "律", "呂", "調", "陽",
            "雲", "騰", "致", "雨", "露", "結", "爲", "霜", "金", "生", "麗", "水", "玉", "出", "崑", "岡",
            "劍", "號", "巨", "闕", "珠", "稱", "夜", "光", "果", "珍", "李", "柰", "菜", "重", "芥", "薑",
            "海", "鹹", "河", "淡", "鱗", "潛", "羽", "翔", "龍", "師", "火", "帝", "鳥", "官", "人", "皇",
            "始", "製", "文", "字", "乃", "服", "衣", "裳", "推", "位", "讓", "國", "有", "虞", "陶", "唐",
            "弔", "民", "伐", "罪", "周", "發", "殷", "湯", "坐", "朝", "問", "道", "垂", "拱", "平", "章",
            "愛", "育", "黎", "首", "臣", "伏", "戎", "羌", "遐", "邇", "壹", "體", "率", "賓", "歸", "王",
            "鳴", "鳳", "在", "樹", "白", "駒", "食", "場", "化", "被", "草", "木", "賴", "及", "萬", "方",
            "恭", "惟", "鞠", "養", "豈", "敢", "毀", "傷", "女", "慕", "貞", "潔", "男", "效", "才", "良", 
            "知", "過", "必", "改", "得", "能", "莫", "忘", "罔", "談", "彼", "短", "靡", "恃", "己", "長", 
            "信", "使", "可", "覆", "器", "欲", "難", "量", "墨", "悲", "絲", "染", "詩", "讚", "羔", "羊", 
            "景", "行", "維", "賢", "克", "念", "作", "聖", "德", "建", "名", "立", "形", "端", "表", "正", 
            "空", "谷", "傳", "聲", "虛", "堂", "習", "聽", "禍", "因", "惡", "積", "福", "緣", "善", "慶", 
            "尺", "璧", "非", "寶", "寸", "陰", "是", "競", "資", "父", "事", "君", "曰", "嚴", "與", "敬", 
            "孝", "當", "竭", "力", "忠", "則", "盡", "命", "臨", "深", "履", "薄", "夙", "興", "溫", "凊"
        ];

        function generateHanjaString() {
            let result = "";
            for (let i = 0; i < 4; i++) {
                result += hanjaPool[Math.floor(Math.random() * hanjaPool.length)];
            }
            return result;
        }

        function generateWarmZenColor() {
            const themes = [
                { glow: "rgba(255, 70, 0, 0.25)", accent: "#ff4500" },   // Crimson Fire
                { glow: "rgba(212, 175, 55, 0.25)", accent: "#d4af37" }, // Imperial Gold
                { glow: "rgba(0, 150, 136, 0.25)", accent: "#009688" },  // Deep Jade
                { glow: "rgba(110, 60, 180, 0.25)", accent: "#9370db" }, // Mystic Violet
                { glow: "rgba(140, 140, 160, 0.25)", accent: "#a0a0b0" } // Ink Shadow
            ];
            return themes[Math.floor(Math.random() * themes.length)];
        }

        function updateMatrix() {
            // 1. Generate new string
            stringEl.textContent = generateHanjaString();

            // 2. Refresh theme colors
            const nextColor = generateWarmZenColor();
            document.documentElement.style.setProperty('--theme-glow', nextColor.glow);
            document.documentElement.style.setProperty('--theme-color', nextColor.accent);

            // 3. Reset CSS layout animation block flawlessly
            stringEl.style.animation = 'none';
            stringEl.offsetHeight; 
            stringEl.style.animation = 'pulse-glow 3s infinite ease-in-out';
        }

        // Run engine immediately and lock interval to exactly 3000ms
        updateMatrix();
        setInterval(updateMatrix, 3000);
    </script>
</body>
</html>
