<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expanded Kanji Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --theme-glow: rgba(0, 229, 255, 0.4);
            --theme-color: #00e5ff;
        }

        body {
            background: radial-gradient(circle, #111118 0%, #050508 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
            transition: background 1s ease;
        }

        /* Ambient background glow that matches the current theme */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--theme-glow);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            transition: all 1s ease;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(15, 15, 25, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px 80px;
            border-radius: 32px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            text-align: center;
            min-width: 380px;
        }

        #category-display {
            font-size: 0.85rem;
            color: var(--theme-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 15px;
            opacity: 0.6;
            transition: color 0.5s ease;
        }

        #kanji-display {
            font-size: 9rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                         0 0 40px var(--theme-glow);
            min-width: 180px;
            min-height: 180px;
            line-height: 180px;
            display: inline-block;
            animation: pulse-glow 1s infinite ease-in-out;
            transition: text-shadow 0.5s ease;
        }

        #meaning-display {
            margin-top: 25px;
            font-size: 1.4rem;
            font-weight: 300;
            color: #e2e2ec;
            letter-spacing: 2px;
        }

        #counter {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        @keyframes pulse-glow {
            0% {
                transform: scale(0.95);
                opacity: 0.2;
                filter: blur(4px);
            }
            20% {
                transform: scale(1.03);
                opacity: 1;
                filter: blur(0px);
            }
            85% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0.97);
                opacity: 0;
            }
        }
    </style>
</head>

            catEl.textContent = current.cat;
            counterEl.textContent = `Matrix Node: ${index + 1} / ${kanjiMatrix.length}`;
